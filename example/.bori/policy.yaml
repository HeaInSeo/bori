# Rename this file to policy.<profile>.yaml when using.
# Example: policy.devspace.yaml

thresholds:
  - name: "requests processed"
    metric: my_app_requests_total
    operator: ">="
    value: 1
  - name: "no errors"
    metric: my_app_errors_total
    operator: "<="
    value: 0

regression:
  enabled: false
  tolerance_percent: 10

reliability:
  required: false

fail_on:
  - threshold_miss
