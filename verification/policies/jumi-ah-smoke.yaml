name: jumi-ah-smoke
provider: kube-slint
mode: cli

# source: metric-2point — standard 2-point engine (pre/post scrape delta)
source: metric-2point

# policy references the kube-slint SLI policy inside each app repo.
# {profile} is substituted at runtime with the active profile name.
policy: .bori/policy.{profile}.yaml

# failOn: FAIL_OR_NOGRADE — NO_GRADE (scrape failure / insufficient data)
# blocks promotion just like FAIL.
failOn: FAIL_OR_NOGRADE

blocking: false
