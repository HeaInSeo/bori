name: example-smoke
provider: kube-slint
mode: cli

# policy: path to the kube-slint SLI policy file inside the app repo.
# {profile} is substituted at runtime (devspace | kind | multipass).
policy: .bori/policy.{profile}.yaml

# baseline: optional path to a promoted revision's sli-summary.json.
# Derived from a promoted BoriRevision, not an arbitrary file.
# See docs/verification-model.md §Baseline과 BoriRevision의 관계.
# baseline: verification/baselines/example.json

# failOn options:
#   NEVER           bori reads JSON and decides (recommended — always writes artifacts)
#   FAIL            block on FAIL only
#   FAIL_OR_NOGRADE block on FAIL or NO_GRADE (recommended for promotion gates)
#   WARN            block on WARN and above
failOn: FAIL_OR_NOGRADE

blocking: false
