# bori-digest-config — K2 digest smoke용 bori-root 구조 ConfigMap.
# K1과 동일한 environment를 사용하고, component.yaml만 다르다:
#   - image.ref: harbor.lab.local:5000/bori/jumi:0.1.0-smoke
#     (StrictValidation: explicit registry + tag 필요)
#   - deploy.bootstrap.adapter: shell  (bootstrap 경로)
# BoriRelease.imageDigest 가 set되면 planner가 deploy.update.adapter(imageswap)로 전환하고
# harbor.lab.local:5000/bori/jumi@sha256:aaa... 로 imageRef를 구성한다.
# --deploy-dry-run 플래그로 실제 kubectl 호출 없이 revision을 프로모션한다.
apiVersion: v1
kind: ConfigMap
metadata:
  name: bori-digest-config
  namespace: bori-system
data:
  environment.yaml: |
    name: kind-smoke
    cluster:
      kubeconfig: ""
      context: ""
    namespacePolicy:
      allowed:
        - jumi-system
        - bori-system
      allowClusterScopedResources: false
    registry:
      default: harbor.lab.local:5000
    secrets:
      mode: reference-only
      redaction: strict
  component.yaml: |
    name: jumi
    kind: data-component
    version: 0.1.0-smoke
    image:
      ref: harbor.lab.local:5000/bori/jumi:0.1.0-smoke
    deploy:
      namespace: jumi-system
      bootstrap:
        adapter: shell
