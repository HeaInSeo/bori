# Kind-specific bori-operator Deployment.
#
# Differences from config/operator/deployment.yaml:
#   - image: bori-operator:dev  (kind load 대상 이미지)
#   - imagePullPolicy: Never    (kind는 registry pull 없음)
#   - bori-repo volume: emptyDir (hostPath 없음)
#     → operator는 /bori 아래에서 release 파일을 찾지 못하고
#       BoriDataPlane.status.conditions에 ReleaseNotFound 등 에러 조건을 기록함.
#       smoke test는 이 조건 설정을 확인하며 /metrics 서빙을 검증함.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bori-operator
  namespace: bori-system
  labels:
    app.kubernetes.io/name: bori-operator
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: bori-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bori-operator
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: bori-operator
      terminationGracePeriodSeconds: 5
      securityContext:
        runAsNonRoot: true
      containers:
        - name: operator
          image: bori-operator:dev
          imagePullPolicy: Never
          args:
            - --bori-root=/bori
            - --bori-dir=/var/bori-state
            - --requeue-interval=10s
            - --leader-elect=false
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 3
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: bori-repo
              mountPath: /bori
              readOnly: true
            - name: bori-state
              mountPath: /var/bori-state
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: bori-repo
          emptyDir: {}
        - name: bori-state
          emptyDir: {}
        - name: tmp
          emptyDir: {}
