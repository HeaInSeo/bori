# bori-deploy-scripts — K1 functional smoke용 shell adapter 스크립트.
# shell adapter는 {appsDir}/{componentName}/deploy.sh 를 실행한다.
# init container가 /apps/jumi/deploy.sh 로 배치한다.
apiVersion: v1
kind: ConfigMap
metadata:
  name: bori-deploy-scripts
  namespace: bori-system
data:
  deploy.sh: |
    #!/usr/bin/env sh
    # K1 smoke: jumi shell-adapter no-op deploy
    printf '[bori-smoke] jumi shell-deploy noop\n'
    exit 0
