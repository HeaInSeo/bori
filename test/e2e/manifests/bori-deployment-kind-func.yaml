# K1 functional smoke용 bori-operator Deployment.
#
# K0 deployment과의 차이:
#   - init container: bori-func-config + bori-deploy-scripts ConfigMap을
#     /bori-config/ 와 /apps/ 에 파일 구조로 배치
#   - --bori-root=/bori-config  (ConfigMap 기반, environment + component 파일 포함)
#   - --bori-dir=/var/bori-state (writable emptyDir, revision/shadow 기록)
#   - --apps-dir=/apps           (shell adapter가 /apps/jumi/deploy.sh 실행)
#   - --requeue-interval=5s      (테스트 응답 속도 향상)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bori-operator
  namespace: bori-system
  labels:
    app.kubernetes.io/name: bori-operator
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: bori-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bori-operator
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: bori-operator
      terminationGracePeriodSeconds: 5
      securityContext:
        runAsNonRoot: false  # init container에서 mkdir/cp 필요
      initContainers:
        - name: setup-bori-root
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -e
              mkdir -p /bori-config/environments/kind-smoke
              cp /bori-config-data/environment.yaml /bori-config/environments/kind-smoke/
              mkdir -p /bori-config/components/jumi
              cp /bori-config-data/component.yaml /bori-config/components/jumi/
              mkdir -p /apps/jumi
              cp /apps-data/deploy.sh /apps/jumi/
              chmod +x /apps/jumi/deploy.sh
          volumeMounts:
            - name: bori-config-data
              mountPath: /bori-config-data
            - name: bori-config
              mountPath: /bori-config
            - name: apps-data
              mountPath: /apps-data
            - name: apps-dir
              mountPath: /apps
      containers:
        - name: operator
          image: bori-operator:dev
          imagePullPolicy: Never
          args:
            - --bori-root=/bori-config
            - --bori-dir=/var/bori-state
            - --apps-dir=/apps
            - --requeue-interval=5s
            - --leader-elect=false
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 3
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: bori-config
              mountPath: /bori-config
              readOnly: true
            - name: bori-state
              mountPath: /var/bori-state
            - name: apps-dir
              mountPath: /apps
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: bori-config-data
          configMap:
            name: bori-func-config
        - name: bori-config
          emptyDir: {}
        - name: bori-state
          emptyDir: {}
        - name: apps-data
          configMap:
            name: bori-deploy-scripts
        - name: apps-dir
          emptyDir: {}
        - name: tmp
          emptyDir: {}
