# kube-slint scraper ServiceAccount for bori-operator smoke tests.
#
# kube-slint launches a curl pod in the target namespace to scrape /metrics.
# This ClusterRole grants the minimum permissions needed for that.
# Applied only during kind smoke and VM integration tests — not production.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-slint
  namespace: bori-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-slint-scraper
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-slint-scraper
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-slint-scraper
subjects:
  - kind: ServiceAccount
    name: kube-slint
    namespace: bori-system
