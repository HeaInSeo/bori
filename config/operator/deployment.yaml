# bori-operator Deployment
#
# Before applying:
#   1. Build the operator image:
#        make build-operator
#        docker build -t bori-operator:latest .
#   2. Load into kind (lab):
#        kind load docker-image bori-operator:latest
#   3. Mount the bori repo into the pod via a hostPath or ConfigMap volume.
#
# Quick lab deploy:
#   make deploy
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bori-operator
  namespace: bori-system
  labels:
    app.kubernetes.io/name: bori-operator
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bori-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bori-operator
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: bori-operator
      terminationGracePeriodSeconds: 10
      securityContext:
        runAsNonRoot: true
      containers:
        - name: operator
          image: bori-operator:latest
          imagePullPolicy: IfNotPresent
          args:
            - --bori-root=$(BORI_ROOT)
            - --bori-dir=$(BORI_DIR)
            - --requeue-interval=$(REQUEUE_INTERVAL)
            - --leader-elect=false
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
          env:
            - name: BORI_ROOT
              valueFrom:
                configMapKeyRef:
                  name: bori-operator-config
                  key: bori-root
            - name: BORI_DIR
              valueFrom:
                configMapKeyRef:
                  name: bori-operator-config
                  key: bori-dir
            - name: REQUEUE_INTERVAL
              valueFrom:
                configMapKeyRef:
                  name: bori-operator-config
                  key: requeue-interval
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 3
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: bori-repo
              mountPath: /bori
              readOnly: true
      volumes:
        - name: bori-repo
          # Lab: mount the bori repository from the host node.
          # Production: replace with a PVC or Git sync sidecar.
          hostPath:
            path: /opt/go/src/github.com/HeaInSeo/bori
            type: Directory
