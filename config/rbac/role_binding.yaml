apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bori-operator-rolebinding
  labels:
    app.kubernetes.io/name: bori-operator
    app.kubernetes.io/component: controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: bori-operator-role
subjects:
  - kind: ServiceAccount
    name: bori-operator
    namespace: bori-system
