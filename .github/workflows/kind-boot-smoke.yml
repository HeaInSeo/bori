name: kind-boot-smoke

# K0 boot smoke: operator 기동 + /metrics + conditions 기록 확인.
# K1 functional smoke (BoriRevision 생성, ConfigMap fixture) 는 다음 PR에서 추가.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apis/**"
      - "controllers/**"
      - "cmd/bori-operator/**"
      - "config/**"
      - "test/e2e/**"
      - "hack/test-kind-boot-smoke.sh"
      - ".github/workflows/kind-boot-smoke.yml"

jobs:
  kind-boot-smoke:
    name: K0 — kind cluster boot smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install kind
        run: |
          curl -Lo ./kind "https://kind.sigs.k8s.io/dl/v0.24.0/kind-$(uname)-amd64"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Run K0 boot smoke
        run: hack/test-kind-boot-smoke.sh
        env:
          KUBE_VERSION: v1.30.0
          # kube-slint: 추후 별도 checkout step 추가 후 활성화
          KUBE_SLINT_DIR: ""

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kind-boot-smoke-artifacts-${{ github.run_id }}
          path: artifacts/kind/**
          if-no-files-found: warn
