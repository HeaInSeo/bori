name: vm-integration

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"  # KST 03:00 (nightly)

jobs:
  vm-integration:
    name: VM integration test
    runs-on: [self-hosted, bori-vm]
    environment: bori-vm-integration

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run VM integration test
        run: hack/test-vm-integration.sh
        env:
          # BORI_VM_REMOTE: SSH target for the remote VM.
          # Configure as a repository variable: Settings → Variables → BORI_VM_REMOTE.
          BORI_VM_REMOTE: ${{ vars.BORI_VM_REMOTE }}
          KUBE_SLINT_DIR: ${{ github.workspace }}/../kube-slint

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vm-integration-artifacts-${{ github.run_id }}
          path: artifacts/vm/**
          if-no-files-found: warn
