name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  unit-and-build:
    name: Unit tests + build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests
        run: GOPROXY=off go test ./...

      - name: Build
        run: go build ./...
