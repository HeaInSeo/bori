name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  unit-and-build:
    name: Unit tests + build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Run unit tests
        run: GOPROXY=off go test ./...

      - name: Build
        run: go build ./...
