apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-sentinel
  namespace: node-sentinel-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node-sentinel
  template:
    metadata:
      labels:
        app: node-sentinel
    spec:
      containers:
        - name: node-sentinel
          image: ghcr.io/heainseo/node-sentinel:v0.1.0
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
