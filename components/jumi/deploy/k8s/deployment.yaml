apiVersion: apps/v1
kind: Deployment
metadata:
  name: jumi
  namespace: jumi-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jumi
  template:
    metadata:
      labels:
        app: jumi
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: jumi
          image: ghcr.io/heainseo/jumi:v0.2.0
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
