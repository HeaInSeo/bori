apiVersion: apps/v1
kind: Deployment
metadata:
  name: jumi
  namespace: jumi-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jumi
  template:
    metadata:
      labels:
        app: jumi
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      serviceAccountName: jumi
      containers:
        - name: jumi
          image: ghcr.io/heainseo/jumi:v0.2.0
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 9090
          env:
            - name: JUMI_NAMING_SALT
              valueFrom:
                secretKeyRef:
                  name: jumi-config
                  key: naming-salt
            - name: JUMI_NAMESPACE
              value: jumi-system
            - name: JUMI_AH_GRPC_TARGET
              value: "artifact-handoff.artifact-handoff-system.svc.cluster.local:9090"
            - name: JUMI_MAX_CONCURRENT_RELEASE
              value: "4"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
