apiVersion: v1
kind: ServiceAccount
metadata:
  name: jumi
  namespace: jumi-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jumi-job-manager
  namespace: jumi-system
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jumi-job-manager
  namespace: jumi-system
subjects:
  - kind: ServiceAccount
    name: jumi
    namespace: jumi-system
roleRef:
  kind: Role
  apiRef: jumi-job-manager
  name: jumi-job-manager
  apiGroup: rbac.authorization.k8s.io
