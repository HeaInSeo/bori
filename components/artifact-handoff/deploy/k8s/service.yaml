apiVersion: v1
kind: Service
metadata:
  name: artifact-handoff
  namespace: artifact-handoff-system
spec:
  selector:
    app: artifact-handoff
  ports:
    - name: metrics
      port: 8080
      targetPort: 8080
    - name: health
      port: 8081
      targetPort: 8081
    - name: grpc
      port: 9090
      targetPort: 9090
