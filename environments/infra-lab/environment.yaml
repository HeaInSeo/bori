# infra-lab: 공용 원격 K8s 클러스터 환경
# 클러스터: kubeadm 기반 3노드 (1 master + 2 workers), libvirt VM
# kubeconfig: infra-lab 저장소의 kubeconfig 파일을 KUBECONFIG 환경변수로 지정
#   예) export KUBECONFIG=/path/to/infra-lab/kubeconfig
# 레지스트리: ghcr.io 사용 (Harbor 구성 완료 후 override 예정)
#   Harbor 준비 시: export BORI_REGISTRY=harbor.YOUR_LAB_IP.nip.io/heainseo
name: infra-lab

cluster:
  kubeconfig: ${KUBECONFIG}
  context: kubernetes-admin@kubernetes

namespacePolicy:
  allowed:
    - jumi-system
    - artifact-handoff-system
    - nan-system
    - node-sentinel-system
    - tori-system
  allowClusterScopedResources: false

registry:
  default: ghcr.io/heainseo

secrets:
  mode: reference-only
  redaction: strict
