version: v2beta1
name: bori

# bori is not a K8s workload — it is a host CLI binary.
# This file is provided for running the gate evaluation standalone
# (e.g., to re-evaluate already-running apps without redeploying).
#
# Normal usage: run `devspace dev` from each app directory.
# The app's own devspace.yaml calls bori-devspace as an after:deploy hook.

vars:
  BORI_PROFILE:
    source: env
    default: "devspace"
  BORI_SMOKE_CMD:
    source: env
    default: ""
  BORI_SMOKE_WAIT:
    source: env
    default: "15s"

hooks:
  - events: ["after:deploy"]
    command: "bin/bori-devspace"
    args:
      - "--profile"
      - "${BORI_PROFILE}"
      - "--smoke-cmd"
      - "${BORI_SMOKE_CMD}"
      - "--smoke-wait"
      - "${BORI_SMOKE_WAIT}"
      - "--v"
