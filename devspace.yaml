version: v2beta1
name: bori

# bori는 각 앱 repo의 devspace.yaml을 직접 실행하지 않습니다.
# DevSpace imports는 DevSpace config merge 용도입니다.
# .bori/component.yaml은 bori adapter가 runtime에 discovery하는 별도 파일입니다.

vars:
  BORI_PROFILE:
    source: env
    default: "devspace"

hooks:
  - events: ["after:deploy"]
    command: "bin/bori-devspace"
    args:
      - "--profile"
      - "${BORI_PROFILE}"
      - "--v"
